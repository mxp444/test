<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新增账号</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="detail-page">
  <main class="report-shell">
    <section class="report-hero">
      <div>
        <p class="feed-eyebrow">账号管理</p>
        <h1>新增账号</h1>
        <p>创建登录账号，并设置账号状态与系统角色。</p>
      </div>
      <a class="report-link" href="/" target="_self">返回系统</a>
    </section>

    <section class="report-section">
      <article class="platform-settings-card">
        <form id="accountCreateForm" class="config-grid polished-review-form">
          <div class="field"><label>用户名</label><input id="accountUsername" required placeholder="登录账号"></div>
          <div class="field"><label>显示名称</label><input id="accountDisplayName" required placeholder="姓名或岗位名"></div>
          <div class="field"><label>初始密码</label><input id="accountPassword" type="password" required placeholder="至少 6 位"></div>
          <div class="field"><label>联系电话</label><input id="accountPhone" placeholder="手机号或办公电话"></div>
          <div class="field"><label>所属部门</label><input id="accountDepartment" placeholder="例如：舆情监测组"></div>
          <div class="field"><label>账号角色</label><select id="accountRole"><option value="user">普通用户</option><option value="admin">管理员</option></select></div>
          <div class="field"><label>账号状态</label><select id="accountEnabled"><option value="true">启用</option><option value="false">禁用</option></select></div>
          <div class="form-actions full">
            <button class="primary" type="submit">创建账号</button>
          </div>
        </form>
        <p id="accountMessage" class="form-message"></p>
      </article>
    </section>
  </main>
  <script src="./account_editor.js"></script>
</body>
</html>
